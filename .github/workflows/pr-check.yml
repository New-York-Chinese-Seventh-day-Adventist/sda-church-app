name: PR Version Check

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  enforce-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for version change
        run: |
          set -euo pipefail

          git fetch origin main
          BASE_VER=$(git show origin/main:package.json | jq -r .version)
          HEAD_VER=$(jq -r .version package.json)

          echo "Base version (main): $BASE_VER"
          echo "PR version: $HEAD_VER"

          if [ "$BASE_VER" == "$HEAD_VER" ]; then
            echo "::error::Validation Failed: The version in package.json has not been changed."
            exit 1
          fi
          echo "Validation Passed."