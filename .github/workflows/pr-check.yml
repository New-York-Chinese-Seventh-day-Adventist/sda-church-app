name: Release - Tagging and Sync
on:
  # ensure that workflows are run on various PR events
  pull_request:
    types: [opened, edited, synchronize, closed]
    branches:
      - main

env:
  # Opt into Node.js 24 for all JavaScript actions to resolve deprecation warnings
  # for actions/checkout@v4 and actions/setup-node@v4.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Ensures the version in package.json was updated
  enforce-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for version change
        run: |
          set -euo pipefail

          # Get the version from the main branch
          git fetch origin main
          BASE_VER=$(git show origin/main:package.json | jq -r .version)

          # Get the version from the current PR branch
          HEAD_VER=$(jq -r .version package.json)

          echo "Base version (main): $BASE_VER"
          echo "PR version: $HEAD_VER"

          if [ "$BASE_VER" == "$HEAD_VER" ]; then
            echo "::error::Validation Failed: The version in package.json has not been changed. Please update the version number manually."
            exit 1
          fi
          echo "Validation Passed: Version was changed from $BASE_VER to $HEAD_VER."

  # Job 2: Syncs files and creates the tag ONLY on merge
  tag:
    needs: enforce-tag
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true && 
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT (Personal Access Token) if main branch is protected
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Sync and Tag from package.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Extract literal version
          VERSION=$(jq -r .version package.json)
          TAG="v$VERSION"
          echo "Version identified: $VERSION"

          # Sync configuration files to match package.json
          # This refreshes package-lock.json version without a full install
          npm install --package-lock-only
          npm run sync-version

          git add app.json public/sw.js package-lock.json

          if ! git diff --cached --quiet; then
            git commit -m "chore: sync configuration files for $TAG [skip ci]"
            git push origin main
          else
            echo "Configuration files already in sync."
          fi

          # Create and push the tag
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping tag creation."
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Successfully tagged $TAG"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Deploy to GitHub Pages
        run: |
          npm run deploy