name: Release Auto-Tag
on:
  # ensure that subsequent commits on PR also trigger the workflow
  push:
    branches:
      - "release/**"

jobs:
  # Job 1: Ensures a version tag exists in the PR description
  enforce-tag:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/'))
    steps:
      - name: Resolve PR body
        id: pr_body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
          else
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            PR_JSON=$(curl -sSL \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls?head=${GITHUB_REPOSITORY_OWNER}:${BRANCH_NAME}&state=open")
            BODY=$(printf '%s' "$PR_JSON" | jq -r '.[0].body // ""')
            if [ -z "$BODY" ]; then
              echo "No open pull request found for branch $BRANCH_NAME. Skipping validation for this push."
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check for versioning tag
        if: steps.pr_body.outputs.skipped != 'true'
        env:
          PR_BODY: ${{ steps.pr_body.outputs.body }}
        run: |
          set -euxo pipefail
          BODY="$PR_BODY"
          echo "PR body length: ${#BODY}"
          echo "--- PR body preview ---"
          printf '%s\n' "$BODY" | sed -n '1,12p'
          echo "--- end preview ---"
          count=0
          echo "count=$count before grep checks"
          if printf '%s' "$BODY" | grep -Fq '#major'; then count=$((count + 1)); fi
          if printf '%s' "$BODY" | grep -Fq '#minor'; then count=$((count + 1)); fi
          if printf '%s' "$BODY" | grep -Fq '#patch'; then count=$((count + 1)); fi
          echo "count=$count after grep checks"
          if [ "$count" -gt 1 ]; then
            echo "::error::Validation Failed: Multiple version tags found in PR description. Please include only one of #major, #minor, or #patch."
            exit 1
          fi
          if [ "$count" -eq 0 ]; then
            echo "::error::Validation Failed: Please add #major, #minor, or #patch to the PR description."
            exit 1
          fi
          echo "Validation Passed: One version tag found."
